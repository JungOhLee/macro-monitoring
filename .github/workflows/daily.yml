name: daily

on:
  schedule:
    - cron: "17 11 * * *"   # ~06:17 ET
    - cron: "17 21 * * *"   # catch-up; pipeline is idempotent
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pytest -q
      - name: Run pipeline
        if: github.event_name != 'push'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python -m pipeline run
          python -m pipeline export
      - name: Commit data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data site/data
          if ! git diff --cached --quiet; then
            git commit -m "data: daily update"
          else
            echo "nothing to commit"
          fi
          git pull --rebase origin main
          git push
      - name: Alerts
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -m pipeline alerts
      - name: Refresh site JSON for artifact (push builds)
        if: github.event_name == 'push'
        run: python -m pipeline export || true   # tolerate empty data on very first push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
